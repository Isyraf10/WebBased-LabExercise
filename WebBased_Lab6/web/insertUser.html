<!DOCTYPE html>
<html>
<head>
    <title>User Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>User Registration</h1>
        <form action="processUser.jsp" method="POST">
            <div class="form-group">
                <label for="username">Username (max 15 characters):</label>
                <input type="text" id="username" name="username" maxlength="15" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password (max 10 characters):</label>
                <input type="password" id="password" name="password" maxlength="10" required>
            </div>
            
            <div class="form-group">
                <label for="firstname">First Name:</label>
                <input type="text" id="firstname" name="firstname" required>
            </div>
            
            <div class="form-group">
                <label for="lastname">Last Name:</label>
                <input type="text" id="lastname" name="lastname" required>
            </div>
            
            <div class="button-group">
                <input type="submit" value="Register">
                <input type="reset" value="Clear">
            </div>
            
            <div class="login-link">
                Already have an account? <a href="login.jsp">Login here</a>
            </div>
        </form>
    </div>
</body>
</html>
